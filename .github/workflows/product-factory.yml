name: Product Factory

on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of products to generate"
        required: false
        default: "15"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Generate products
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '15' }}
          python3 scripts/generate-products.py --count $COUNT
      - name: Commit products
        run: |
          git config user.name "AI Business Engine"
          git config user.email "bot@ai-business.com"
          git add products/
          git diff --quiet && git diff --staged --quiet || git commit -m "📦 Product batch $(date +%Y%m%d)"
          git push
