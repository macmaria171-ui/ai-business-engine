name: Gumroad Publish

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Publish to Gumroad
        env:
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_TOKEN }}
          GUMROAD_EMAIL: ${{ secrets.GUMROAD_EMAIL }}
        run: python3 scripts/publish-gumroad.py
