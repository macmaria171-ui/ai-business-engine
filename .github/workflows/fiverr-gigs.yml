name: Fiverr Gigs

on:
  schedule:
    - cron: "0 8 * * 1,4"
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Optimize gigs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/fiverr-gigs.py
      - name: Commit gig updates
        run: |
          git config user.name "AI Business Engine"
          git config user.email "bot@ai-business.com"
          git add fiverr/gigs/
          git diff --quiet && git diff --staged --quiet || git commit -m "🎯 Fiverr gig optimization $(date +%Y%m%d)"
          git push
